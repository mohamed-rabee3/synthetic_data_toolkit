project_name: "saudi-qa-dataset"

paths:
  input_docs_dir: "data/input/"
  intermediate_dir: "data/intermediate/"
  output_dir: "data/output/"
  reports_dir: "reports/coverage/"
  prompts_dir: "prompts/"
  checkpoint_dir: "data/intermediate/.checkpoints/"

stages:
  run_chunking: true
  run_generation: true
  run_cleaning: true
  run_evaluation: true

domain_context: "هذه وثائق لشركة تقنية سعودية متخصصة في حلول الدفع الإلكتروني"

# Generation LLM — Gemini
# mode: "ai_studio" (API key only) or "vertex_ai" (GCP project)
# Override with GEMINI_MODE env var
generation_llm:
  provider: "gemini"
  mode: "vertex_ai"                      # "ai_studio" | "vertex_ai"
  model: "gemini-2.0-flash-lite"
  api_key: null                          # AI Studio only — set via GOOGLE_API_KEY env var
  project: null                          # Vertex AI only — set via GOOGLE_CLOUD_PROJECT env var
  location: "global"                     # Vertex AI only — set via GOOGLE_CLOUD_LOCATION env var
  timeout_seconds: 120
  max_retries: 3
  retry_delay_seconds: 5
  requests_per_minute: 500

# Judge / utility LLM — Ollama
# mode: "local" (localhost) or "cloud" (ollama.com hosted)
# Override with OLLAMA_MODE env var
judge_llm:
  provider: "ollama"
  mode: "local"                          # "local" | "cloud"
  model: "qwen3"
  host: "http://localhost:11434"         # local mode — set via OLLAMA_HOST env var
  api_key: null                          # cloud mode — set via OLLAMA_API_KEY env var
  timeout_seconds: 120
  max_retries: 5
  retry_delay_seconds: 5
  requests_per_minute: 30               # conservative for cloud; raise to 60+ for local

logging:
  level: "INFO"
  log_file: "pipeline.log"
  log_failed_items: true
