project_name: "saudi-qa-dataset"

paths:
  input_docs_dir: "data/input/"
  intermediate_dir: "data/intermediate/"
  output_dir: "data/output/"
  reports_dir: "reports/coverage/"
  prompts_dir: "prompts/"
  checkpoint_dir: "data/intermediate/.checkpoints/"

stages:
  run_chunking: true
  run_generation: true
  run_cleaning: true
  run_evaluation: true

domain_context: "هذي وثائق الهيئة السعودية لتنظيم الكهرباء (سيرا) اللي تتولى تنظيم قطاع الكهرباء في المملكة وتقديم الإرشادات والخدمات للمستهلكين"

# Generation LLM — Gemini
# mode: "ai_studio" (API key only) or "vertex_ai" (GCP project)
# Override with GEMINI_MODE env var
generation_llm:
  provider: "gemini"
  mode: "vertex_ai"                      # "ai_studio" | "vertex_ai"
  model: "gemini-3.1-flash-lite-preview"
  thinking_level: "medium"               # null, "low", "medium", "high"
  api_key: null                          # set via GOOGLE_API_KEY env var
  project: null                          # Vertex AI ADC only — set via GOOGLE_CLOUD_PROJECT env var
  location: "global"                     # Vertex AI ADC only — set via GOOGLE_CLOUD_LOCATION env var
  timeout_seconds: 120
  max_retries: 5
  retry_delay_seconds: 8
  requests_per_minute: 20
# Judge / utility LLM — Gemini (same model as generation for consistency)
judge_llm:
  provider: "gemini"
  mode: "vertex_ai"
  model: "gemini-3.1-flash-lite-preview"
  thinking_level: "low"
  api_key: null                          # set via GOOGLE_API_KEY env var
  timeout_seconds: 120
  max_retries: 5
  retry_delay_seconds: 8
  requests_per_minute: 20

logging:
  level: "INFO"
  log_file: "pipeline.log"
  log_failed_items: true
